<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamus EN-ID</title>
    <style>
      :root {
        --bg-1: #0f1720;
        --bg-2: #071226;
        --card: rgba(22, 25, 31, 0.7);
        --accent: #6ea8fe;
        --accent-dim: rgba(46, 64, 92, 0.55);
        --text: #e8e9ec;
        --muted: #9aa0aa;
        --border: rgba(255, 255, 255, 0.04);
        --glass: rgba(255, 255, 255, 0.02);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 36px 16px;
        -webkit-font-smoothing: antialiased;
      }
      .app {
        width: 100%;
        max-width: 720px;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 6px;
      }
      p.subtitle {
        color: var(--muted);
        margin: 0 0 18px;
        font-size: 13px;
      }

      .tabs {
        display: flex;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 6px;
        margin-bottom: 18px;
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.45) inset;
      }
      .tabs button {
        flex: 1;
        padding: 12px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
      }
      .tabs button.active {
        background: var(--accent);
        color: #0b1220;
      }

      .search-box {
        margin-bottom: 20px;
      }
      .search-wrapper {
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        fill: none;
        stroke: var(--muted);
        stroke-width: 1.6px;
        pointer-events: none;
      }
      input {
        width: 100%;
        padding: 12px 40px 12px 40px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          var(--glass),
          rgba(255, 255, 255, 0.01)
        );
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition:
          box-shadow 0.18s ease,
          border-color 0.12s ease;
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.45);
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 8px 30px rgba(78, 138, 255, 0.08);
      }
      .clear-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
        display: none;
      }
      .clear-btn.visible {
        display: inline-flex;
      }

      #result {
        min-height: 40px;
        margin-bottom: 24px;
      }

      .result-card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(2, 8, 20, 0.6);
        transition:
          transform 0.16s ease,
          opacity 0.18s ease;
        transform-origin: top center;
        opacity: 0;
      }
      .result-card.fade-in {
        transform: translateY(6px);
        opacity: 1;
      }
      .result-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .result-head .word {
        font-weight: 700;
        font-size: 19px;
      }
      .pos-badge {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--accent);
        background: var(--accent-dim);
        padding: 3px 8px;
        border-radius: 6px;
      }
      .translation {
        color: var(--accent);
        font-size: 17px;
        margin-bottom: 12px;
        font-weight: 600;
      }
      .example {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }
      .example b {
        color: var(--text);
        font-weight: 500;
      }

      .not-found {
        color: var(--muted);
        font-size: 14px;
        padding: 8px 2px;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
        padding: 8px 2px;
      }

      .list-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.01),
          transparent
        );
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.12s ease,
          transform 0.08s ease;
      }
      li:last-child {
        border-bottom: none;
      }
      li:hover {
        background: rgba(255, 255, 255, 0.02);
        transform: translateX(4px);
      }
      li .right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      li .translated {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>📖 Kamus EN ⇄ ID</h1>
      <p class="subtitle">
        Didukung SQLite (via sql.js) — data asli disimpan dalam
        <code>kamus.db</code>
      </p>

      <div class="tabs">
        <button id="tabEnId" class="active">Inggris → Indonesia</button>
        <button id="tabIdEn">Indonesia → Inggris</button>
      </div>

      <div class="search-box">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle
              cx="11"
              cy="11"
              r="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></circle>
            <path
              d="M21 21l-4.35-4.35"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="Ketik kata..."
            autocomplete="off"
          />
          <button id="clearBtn" class="clear-btn" aria-label="Bersihkan">
            ×
          </button>
        </div>
      </div>

      <div id="result"><div class="status">Memuat database...</div></div>

      <div class="list-title">Daftar kata tersedia</div>
      <ul id="wordList"></ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script>
      let db = null;
      let mode = "en-id"; // atau "id-en"

      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const result = document.getElementById("result");
      const wordList = document.getElementById("wordList");
      const tabEnId = document.getElementById("tabEnId");
      const tabIdEn = document.getElementById("tabIdEn");

      async function init() {
        const SQL = await initSqlJs({
          locateFile: (file) =>
            `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`,
        });
        const res = await fetch("kamus.db");
        const buf = await res.arrayBuffer();
        db = new SQL.Database(new Uint8Array(buf));
        result.innerHTML = "";
        renderList();
      }

      function query(sql, params = []) {
        const stmt = db.prepare(sql);
        stmt.bind(params);
        const rows = [];
        while (stmt.step()) rows.push(stmt.getAsObject());
        stmt.free();
        return rows;
      }

      function renderCard(row) {
        const isEnId = mode === "en-id";
        const word = isEnId ? row.english : row.indonesian;
        const translation = isEnId ? row.indonesian : row.english;
        const exampleSource = isEnId ? row.example_en : row.example_id;
        const exampleTarget = isEnId ? row.example_id : row.example_en;

        const html = `
        <div class="result-card">
          <div class="result-head">
            <span class="word">${word}</span>
            <span class="pos-badge">${row.pos}</span>
          </div>
          <div class="translation">➜ ${translation}</div>
          <div class="example">
            <div><b>Contoh:</b> ${exampleSource}</div>
            <div>${exampleTarget}</div>
          </div>
        </div>`;

        result.innerHTML = html;
        const card = result.querySelector(".result-card");
        if (card) {
          // small delay to trigger transition
          requestAnimationFrame(() => card.classList.add("fade-in"));
        }
      }

      function search(qRaw) {
        const q = qRaw.trim().toLowerCase();
        if (!q) {
          result.innerHTML = "";
          return;
        }
        const column = mode === "en-id" ? "english" : "indonesian";
        const rows = query(
          `SELECT * FROM words WHERE LOWER(${column}) = ? LIMIT 1`,
          [q],
        );
        if (rows.length) {
          renderCard(rows[0]);
        } else {
          result.innerHTML = `<div class="not-found">Kata "${qRaw}" tidak ditemukan.</div>`;
        }
      }

      function renderList() {
        const orderCol = mode === "en-id" ? "english" : "indonesian";
        const rows = query(`SELECT * FROM words ORDER BY ${orderCol} ASC`);
        wordList.innerHTML = rows
          .map((row) => {
            const w = mode === "en-id" ? row.english : row.indonesian;
            const t = mode === "en-id" ? row.indonesian : row.english;
            return `<li data-word="${w}">
                  <span>${w}</span>
                  <span class="right">
                    <span class="pos-badge">${row.pos}</span>
                    <span class="translated">${t}</span>
                  </span>
                </li>`;
          })
          .join("");

        wordList.querySelectorAll("li").forEach((li) => {
          li.addEventListener("click", () => {
            input.value = li.dataset.word;
            search(li.dataset.word);
          });
        });
      }

      function switchMode(newMode) {
        mode = newMode;
        tabEnId.classList.toggle("active", mode === "en-id");
        tabIdEn.classList.toggle("active", mode === "id-en");
        input.value = "";
        result.innerHTML = "";
        renderList();
      }

      tabEnId.addEventListener("click", () => switchMode("en-id"));
      tabIdEn.addEventListener("click", () => switchMode("id-en"));

      function toggleClear(show) {
        if (!clearBtn) return;
        clearBtn.classList.toggle("visible", !!show);
      }

      input.addEventListener("input", (e) => {
        const v = e.target.value;
        toggleClear(v.length > 0);
        search(v);
      });

      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          input.value = "";
          toggleClear(false);
          search("");
          input.focus();
        });
      }

      init();
    </script>
  </body>
</html>
